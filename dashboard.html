<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">

    <h2>QLSV Cloud</h2>
    
    <a href="dashboard.html">Dashboard</a>
    <a href="students.html">Sinh viên</a>
    <a href="department.html">Khoa</a>
    <a href="classes.html">Lớp học</a>
    <a href="teachers.html">Giảng viên</a>
    <button onclick="logout()">
        Đăng xuất
    </button>

</div>

<div class="content">

    <h1>Dashboard</h1>

    <div class="cards">

    <div class="card">
        <h2 id="totalStudents">0</h2>
        <p>Sinh viên</p>
    </div>

    <div class="card">
        <h2 id="totalClasses">0</h2>
        <p>Lớp học</p>
    </div>

    <div class="card">
        <h2 id="totalDepartments">0</h2>
        <p>Khoa</p>
    </div>

</div>

<div class="dashboard-grid">
    <div class="chart-card">
        <h3>Phân loại sinh viên theo trạng thái</h3>
        <canvas id="statusChart" height="260"></canvas>
    </div>

    <div class="chart-card">
        <h3>Top lớp có nhiều sinh viên</h3>
        <canvas id="classChart" height="260"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="dashboard.js"></script>

</body>
</html>
